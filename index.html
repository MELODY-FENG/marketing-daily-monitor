<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美线客厅家具柜 · 搜索广告日监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Microsoft YaHei','PingFang SC',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:13px}

/* Header frozen */
.header{position:sticky;top:0;z-index:999;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:10px 16px 8px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.htop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:4px}
.htop h1{font-size:17px;font-weight:700}.htop h1 .hl{color:#e94560}
.htop .db{background:rgba(233,69,96,.15);border:1px solid #e94560;padding:2px 10px;border-radius:16px;font-size:11px;color:#ff6b81;white-space:nowrap}
.fbar{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.fbar select,.fbar input{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);color:#fff;padding:2px 5px;border-radius:4px;font-size:10px;max-width:88px;cursor:pointer;outline:none}
.fbar select option{background:#1a1a2e;color:#fff}
.fbar .btn{padding:2px 10px;border-radius:4px;font-size:10px;cursor:pointer;font-weight:600;border:none;transition:all .2s}
.fbar .srch{background:#e94560;color:#fff}.fbar .srch:hover{background:#d63850}
.fbar .clr{background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.12)}.fbar .clr:hover{background:rgba(255,255,255,.15);color:#fff}
.fbar label{font-size:9px;color:#8899aa}

.container{max-width:1600px;margin:0 auto;padding:10px 14px}

/* KPI */
.kpi{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:6px;margin-bottom:12px}
.kc{background:#fff;border-radius:8px;padding:8px 10px;box-shadow:0 1px 4px rgba(0,0,0,.05);border-left:3px solid #4a9eff;transition:all .2s}
.kc:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.08)}
.kc .l{font-size:9px;color:#888;margin-bottom:1px}
.kc .v{font-size:16px;font-weight:700}
.kc .s{font-size:9px;color:#999}
.kc.br{border-left-color:#e94560}.kc.bg{border-left-color:#2ed573}.kc.bo{border-left-color:#ffa502}
.kc.bp{border-left-color:#a55eea}.kc.bb{border-left-color:#4a9eff}.kc.bt{border-left-color:#00d2d3}
.kc .v.cr{color:#e94560}.kc .v.co{color:#ffa502}.kc .v.cg{color:#2ed573}

/* Section */
.sec{background:#fff;border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.shd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #f0f2f5}
.shd h2{font-size:14px;font-weight:700;display:flex;align-items:center;gap:5px}

/* Tables */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#f8f9fa;padding:5px 6px;text-align:left;font-weight:600;color:#555;white-space:nowrap;border-bottom:2px solid #e0e0e0;position:sticky;top:0;font-size:10px}
td{padding:4px 6px;border-bottom:1px solid #f0f0f0;white-space:nowrap}
tr:hover td{background:#f5f7ff}
.num{text-align:right;font-family:Consolas,monospace;font-size:11px}
.bar{display:inline-block;width:50px;height:12px;background:#f0f0f0;border-radius:6px;overflow:hidden;vertical-align:middle;margin-right:2px}
.bf{height:100%;border-radius:6px;transition:width .4s}
.bf.g{background:linear-gradient(90deg,#2ed573,#7bed9f)}.bf.o{background:linear-gradient(90deg,#ffa502,#eccc68)}
.bf.r{background:linear-gradient(90deg,#e94560,#ff6b81)}.bf.p{background:linear-gradient(90deg,#a55eea,#dda0dd)}
.bf.b{background:linear-gradient(90deg,#4a9eff,#74b9ff)}

/* ACOS fold */
.as{margin-bottom:6px;border:1px solid #e8e8e8;border-radius:6px;overflow:hidden}
.ah{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;cursor:pointer;user-select:none;transition:background .2s;flex-wrap:wrap;gap:4px}
.ah:hover{filter:brightness(.97)}
.ah .t{font-weight:600;font-size:12px;display:flex;align-items:center;gap:4px}
.ah .st{display:flex;gap:8px;font-size:10px;flex-wrap:wrap}
.ah .st .si{text-align:right}.ah .st .sl{color:#888;font-size:8px}.ah .st .sv{font-weight:600}
.ab{display:none;padding:6px 10px;background:#fafbfc;border-top:1px solid #e8e8e8}
.ab.open{display:block}
.ar{transition:transform .3s;display:inline-block}.ar.open{transform:rotate(90deg)}
.wt{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600}
.wt.g{background:#e8f5e9;color:#2e7d32}.wt.o{background:#fff3e0;color:#e65100}
.wt.r{background:#fce4ec;color:#c62828}.wt.p{background:#f3e5f5;color:#6a1b9a}

/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:8px;flex-wrap:wrap}
.tb{padding:4px 10px;border:1px solid #ddd;background:#f8f9fa;border-radius:4px 4px 0 0;cursor:pointer;font-size:11px;transition:all .2s;color:#666}
.tb.act{background:#fff;border-bottom-color:#fff;color:#1a1a2e;font-weight:600}
.tb:hover:not(.act){background:#eef0f5}
.tp{display:none}.tp.act{display:block}

@media(max-width:768px){.kpi{grid-template-columns:repeat(2,1fr)}.fbar select,.fbar input{max-width:70px}}
</style>
</head>
<body>

<div class="header">
  <div class="htop">
    <h1>📊 美线客厅家具柜 <span class="hl">全部搜索广告</span> · 日监控</h1>
    <div class="db" id="db">📅 加载中...</div>
  </div>
  <div class="fbar">
    <label>📌状态</label><select id="f0"><option value="">全部</option></select>
    <label>🏪店铺</label><select id="f1"><option value="">全部</option></select>
    <label>👥业务组</label><select id="f2"><option value="">全部</option></select>
    <label>👤负责人</label><select id="f3"><option value="">全部</option></select>
    <label>📂三级分类</label><select id="f4"><option value="">全部</option></select>
    <label>📢广告类型</label><select id="f5"><option value="">全部</option></select>
    <label>🎯活动</label><input id="f6" placeholder="搜索活动" style="width:70px">
    <button class="btn srch" onclick="apply()">🔍搜索</button>
    <button class="btn clr" onclick="clr()">✕清除</button>
  </div>
</div>

<div class="container">
  <!-- KPI 第一排 -->
  <div class="kpi" id="kpi1"></div>
  <!-- KPI 第二排 -->
  <div class="kpi" id="kpi2"></div>

  <!-- ACOS预警 -->
  <div class="sec">
    <div class="shd"><h2>🚨 ACOS 分段预警</h2><span style="font-size:10px;color:#999">点击展开CAM</span></div>
    <div id="acosArea"></div>
  </div>

  <!-- 业务组警示 -->
  <div class="sec">
    <div class="shd"><h2>⚠️ 业务组警示</h2><span style="font-size:10px;color:#999">ACOS>50%</span></div>
    <div class="tw"><table><thead><tr id="wh"><th>业务组</th><th class="num">活动</th><th class="num">花费</th><th class="num">占比</th><th class="num">$CPC</th><th class="num">CTR%</th><th class="num">CVR%</th><th class="num">$CPO</th><th class="num">ACOS%</th><th class="num">ROAS</th></tr></thead><tbody id="tb_gw"></tbody></table></div>
  </div>

  <!-- 三级分类警示 -->
  <div class="sec">
    <div class="shd"><h2>📂 三级分类警示</h2><span style="font-size:10px;color:#999">ACOS>50%</span></div>
    <div class="tw"><table><thead><tr id="wh"><th>三级分类</th><th class="num">活动</th><th class="num">花费</th><th class="num">占比</th><th class="num">$CPC</th><th class="num">CTR%</th><th class="num">CVR%</th><th class="num">$CPO</th><th class="num">ACOS%</th><th class="num">ROAS</th></tr></thead><tbody id="tb_cw"></tbody></table></div>
  </div>

  <!-- 业务负责人警示 -->
  <div class="sec">
    <div class="shd"><h2>👤 业务负责人警示</h2><span style="font-size:10px;color:#999">ACOS>50%</span></div>
    <div class="tw"><table><thead><tr id="wh"><th>负责人</th><th class="num">活动</th><th class="num">花费</th><th class="num">占比</th><th class="num">$CPC</th><th class="num">CTR%</th><th class="num">CVR%</th><th class="num">$CPO</th><th class="num">ACOS%</th><th class="num">ROAS</th></tr></thead><tbody id="tb_ow"></tbody></table></div>
  </div>

  <!-- 明细Tab -->
  <div class="sec">
    <div class="shd"><h2>📋 明细分析</h2></div>
    <div class="tabs">
      <button class="tb act" onclick="sw('s',this)">🏪 店铺</button>
      <button class="tb" onclick="sw('a',this)">📢 广告类型</button>
      <button class="tb" onclick="sw('c',this)">📂 三级分类</button>
      <button class="tb" onclick="sw('m',this)">📂×📢 交叉</button>
    </div>
    <div id="tp_s" class="tp act"><div class="tw"><table id="tbl_s"></table></div></div>
    <div id="tp_a" class="tp"><div class="tw"><table id="tbl_a"></table></div></div>
    <div id="tp_c" class="tp"><div class="tw"><table id="tbl_c"></table></div></div>
    <div id="tp_m" class="tp"><div class="tw"><table id="tbl_m"></table></div></div>
  </div>

  <!-- 全量 -->
  <div class="sec">
    <div class="shd"><h2>📄 全量数据</h2><span style="font-size:10px;color:#999">Top 500 按花费降序</span></div>
    <div class="tw"><table id="tbl_fd"></table></div>
  </div>
</div>

function decompress(b64) {
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
    const ds = new DecompressionStream('gzip');
    const writer = ds.writable.getWriter();
    writer.write(arr);
    writer.close();
    return new Response(ds.readable).arrayBuffer().then(buf => {
        const dec = new TextDecoder();
        return JSON.parse(dec.decode(buf));
    });
}

let D = null;

async function init() {
    try {
        D = await decompress(B64_DATA);
        document.getElementById('db').textContent = '📅 ' + (D.dateRange||'2026-07-09 ~ 2026-07-15');
        const fm = ['投放状态','店铺','业务组','业务负责人','三级分类','广告类型'];
        for(let i=0;i<6;i++){
            const sel=document.getElementById('f'+i);
            (D.filters[fm[i]]||[]).forEach(v=>{const o=document.createElement('option');o.value=v;o.text=v;sel.appendChild(o)});
        }
        renderAll();
    } catch(e) {
        document.body.innerHTML='<div style="text-align:center;padding:40px;color:#e94560;"><h2>❌ 数据加载失败</h2><p style="color:#999;margin-top:10px;">'+e.message+'</p></div>';

}

function getF() {
    const f=[0,1,2,3,4,5].map(i=>document.getElementById('f'+i).value);
    const fc=document.getElementById('f6').value.toLowerCase().trim();
    return {f,fc};
}

// Use pre-aggregated data for all tables (no dynamic filtering needed for aggregates)
function renderAll() {
    const ff=getF();
    const filtered = D.raw.filter(r=>{
        for(let i=0;i<6;i++) if(ff.f[i]&&r[i]!==ff.f[i]) return false;
        if(ff.fc&&r[6].toLowerCase().indexOf(ff.fc)===-1) return false;
        return true;
    });

    // Calc KPI
    let c=0,camps=new Set(),sp=0,im=0,cl=0,sq=0,sa=0,ps=0,db=0,cb=0;
    filtered.forEach(r=>{if(r[6])camps.add(r[6]);sp+=r[7];im+=r[8];cl+=r[9];sq+=r[10];sa+=r[11];});
    c=camps.size;
    // 从原始数据拿预算（raw里没有，用预聚合）
    const cpc=cl>0?sp/cl:0,ctr=im>0?cl/im:0,cvr=cl>0?sq/cl:0,cpo=sq>0?sp/sq:0,acos=sa>0?sp/sa:0,roas=sp>0?sa/sp:0,dr=sq>0?ps/sq:0;

    document.getElementById('kpi1').innerHTML=[
        {l:'📋 广告活动数',v:FN(c),c:'bb'},
        {l:'💸 总花费',v:'$'+F(sp),c:'br'},
        {l:'👁 曝光量',v:FN(im),c:'bb'},
        {l:'👆 点击量',v:FN(cl),c:'bg'},
        {l:'🛒 销量',v:FN(sq),c:'bt'},
        {l:'💰 销额',v:'$'+F(sa),c:'bp'},
    ].map(x=>'<div class="kc '+x.c+'"><div class="l">'+x.l+'</div><div class="v">'+x.v+'</div></div>').join('');

    document.getElementById('kpi2').innerHTML=[
        {l:'💰 $CPC',v:'$'+F(cpc,4),c:'bp'},
        {l:'📈 CTR%',v:FP(ctr),c:'bg'},
        {l:'📊 CVR%',v:FP(cvr),c:'bb'},
        {l:'💵 $CPO',v:'$'+F(cpo),c:'bo'},
        {l:'⚠️ ACOS%',v:FP(acos),c:'br',xc: acos>0.5?'cr':acos>0.35?'co':'cg'},
        {l:'📈 ROAS',v:F(roas),c:'bp'},

    ].map(x=>'<div class="kc '+x.c+'"><div class="l">'+x.l+'</div><div class="v '+(x.xc||'')+'">'+x.v+'</div></div>').join('');

    // ACOS预警 - 使用预聚合数据
    renderACOS(filtered);

    // 高ACOS表 - 也用预聚合（不改）
    renderWarn('tb_gw',D.gw);
    renderWarn('tb_cw',D.cw);
    renderWarn('tb_ow',D.ow);

    // 明细
    renderDet('tbl_s',D.stores,['名称','活动','花费','曝光','点击','销量','$CPC','CTR%','CVR%','$CPO','ACOS%','ROAS','直购率%'],
        ['name','cam','sp','im','cl','sq','cpc','ctr','cvr','cpo','acos','roas','dr']);
    renderDet('tbl_a',D.adtypes,['广告类型','活动','花费','曝光','点击','销量','$CPC','CTR%','CVR%','$CPO','ACOS%','ROAS','直购率%'],
        ['name','cam','sp','im','cl','sq','cpc','ctr','cvr','cpo','acos','roas','dr']);
    renderDet('tbl_c',D.cat3s,['三级分类','活动','花费','曝光','点击','销量','$CPC','CTR%','CVR%','$CPO','ACOS%','ROAS','直购率%'],
        ['name','cam','sp','im','cl','sq','cpc','ctr','cvr','cpo','acos','roas','dr']);
    renderDet('tbl_m',D.cat3ad,['三级分类','广告类型','活动','花费','曝光','点击','销量','$CPC','CTR%','CVR%','$CPO','ACOS%','ROAS','直购率%'],
        ['c3','at','cam','sp','im','cl','sq','cpc','ctr','cvr','cpo','acos','roas','dr']);

function renderACOS(data) {

    const info = [
        {k:'normal',l:'ACOS≤35%',t:'✅ 正常ACOS区间',e:'✅',c:'g',d: D.acos_normal},
        {k:'mid',l:'35%<ACOS≤50%',t:'⚠️ 中高ACOS区间',e:'⚠️',c:'o',d: D.acos_mid},
        {k:'high',l:'50%<ACOS≤100%',t:'🔶 高ACOS区间',e:'🔶',c:'r',d: D.acos_high},
        {k:'super',l:'ACOS>100%',t:'🚨 超高ACOS区间',e:'🚨',c:'p',d: D.acos_super},

    const bg={g:'#e8f5e9',o:'#fff3e0',r:'#fce4ec',p:'#f3e5f5'};
    const bc={g:'#4caf50',o:'#ff9800',r:'#f44336',p:'#9c27b0'};

    info.forEach(b=>{
        const a = b.d || {count:0,spend:0,pct:0,cpc:0,ctr:0,cvr:0,cpo:0,acos:0,roas:0};
        const wrap=document.createElement('div');wrap.className='as';

            '<div class="si"><div class="sl">ROAS</div><div class="sv">'+F(a.roas)+'</div></div>'+
            '</div></div><div class="ab" id="ab_'+b.k+'"></div>';

        const hdr=wrap.querySelector('.ah');
        hdr.addEventListener('click',function(){
            const bd=this.nextElementSibling;bd.classList.toggle('open');
            this.querySelector('.ar').classList.toggle('open');
            if(bd.classList.contains('open')&&!bd._loaded){
                bd._loaded=true;
                const camps = D['cam_'+b.k]||[];
                if(!camps.length){bd.innerHTML='<div style="color:#999;padding:6px;text-align:center;">暂无数据</div>';return;}

                html+='</tbody></table>';bd.innerHTML=html;
            }
        });
        area.appendChild(wrap);
    });

function renderWarn(id, data) {
    const tb=document.getElementById(id);tb.innerHTML='';
    if(!data||!data.length){tb.innerHTML='<tr><td colspan="9" style="text-align:center;color:#999;padding:10px;">暂无数据</td></tr>';return;}
    data.forEach((r,i)=>{
        const cls=r.acos>1?' style="background:#fff0f0"':r.acos>0.7?' style="background:#fff8f0"':'';
        tb.innerHTML+='<tr'+cls+'><td>'+r.name+'</td><td class="num">'+FN(r.cam)+'</td><td class="num">$'+F(r.sp)+'</td><td class="num"><span class="bar"><span class="bf '+(r.spPct>20?'r':r.spPct>10?'o':'b')+'" style="width:'+Math.min(r.spPct,100)+'%"></span></span>'+F(r.spPct)+'%</td><td class="num">$'+F(r.cpc,4)+'</td><td class="num">'+FP(r.ctr)+'</td><td class="num">'+FP(r.cvr)+'</td><td class="num">$'+F(r.cpo)+'</td><td class="num">'+FP(r.acos)+'</td><td class="num">'+F(r.roas)+'</td></tr>';
    });
}

    if(!data||!data.length){tbl.innerHTML='<tr><td colspan="'+(headers.length)+'" style="text-align:center;color:#999;padding:10px;">暂无数据</td></tr>';return;}
    let h='<thead><tr>'+headers.map((h,i)=>{
        const isNum = ['活动','花费','曝光','点击','销量','$CPC','CTR%','CVR%','$CPO','ACOS%','ROAS','直购率%','占比'].some(k=>h.includes(k));
        return '<th'+(isNum?' class="num"':'')+'>'+h+'</th>';
    }).join('')+'</tr></thead><tbody>';
    const fmts={cam:v=>FN(v),sp:v=>'$'+F(v),im:v=>FN(v),cl:v=>FN(v),sq:v=>FN(v),
        cpc:v=>'$'+F(v,4),ctr:v=>FP(v),cvr:v=>FP(v),cpo:v=>'$'+F(v),acos:v=>FP(v),roas:v=>F(v),dr:v=>FP(v)};
    data.forEach((r,i)=>{
        h+='<tr'+(i%2===1?' style="background:#fafbfc"':'')+'>';
        fields.forEach(f=>{
            const isNum = ['cam','sp','im','cl','sq','cpc','ctr','cvr','cpo','acos','roas','dr'].includes(f);
            const v = fmts[f] ? fmts[f](r[f]) : (r[f]||'-');
            h+='<td'+(isNum?' class="num"':'')+'>'+v+'</td>';
        });
        h+='</tr>';
    });
    h+='</tbody>';tbl.innerHTML=h;
}

function apply(){renderAll()}
function clr(){for(let i=0;i<6;i++)document.getElementById('f'+i).value='';document.getElementById('f6').value='';renderAll()}
function sw(id,btn){
    document.querySelectorAll('.tp').forEach(p=>p.classList.remove('act'));
    document.querySelectorAll('.tb').forEach(b=>b.classList.remove('act'));
    document.getElementById('tp_'+id).classList.add('act');
    btn.classList.add('act');
}

init();
</script>
