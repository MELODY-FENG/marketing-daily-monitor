<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美线客厅家具柜 · 搜索广告日监控</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Microsoft YaHei','PingFang SC',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:14px}
.header{position:sticky;top:0;z-index:999;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:14px 20px 12px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.htop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.htop h1{font-size:20px;font-weight:700;letter-spacing:.5px}.htop h1 .hl{color:#e94560}
.htop .db{background:rgba(233,69,96,.15);border:1px solid #e94560;padding:4px 14px;border-radius:20px;font-size:13px;color:#ff6b81;white-space:nowrap}
.fbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.fbar .fg{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.05);padding:4px 10px 4px 6px;border-radius:6px;border:1px solid rgba(255,255,255,.06)}
.fbar .fg label{font-size:11px;color:#8899aa;white-space:nowrap;font-weight:500}
.fbar select,.fbar input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;padding:5px 8px;border-radius:5px;font-size:12px;min-width:95px;cursor:pointer;outline:none}
.fbar select:hover,.fbar input:hover{border-color:#e94560}
.fbar select option{background:#1a1a2e;color:#fff}
.fbar .btn{padding:5px 20px;border-radius:5px;font-size:12px;cursor:pointer;font-weight:600;border:none;transition:all .2s}
.fbar .srch{background:#e94560;color:#fff}.fbar .srch:hover{background:#d63850;transform:translateY(-1px)}
.fbar .clr{background:rgba(255,255,255,.08);color:#ddd;border:1px solid rgba(255,255,255,.12)}.fbar .clr:hover{background:rgba(255,255,255,.15);color:#fff}
.container{max-width:1600px;margin:0 auto;padding:14px 18px}

/* Multi-Select Dropdown */
.ms-wrap{position:relative;display:inline-block;min-width:110px}
.ms-trigger{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;padding:5px 8px;border-radius:5px;font-size:12px;cursor:pointer;user-select:none;min-height:30px;white-space:nowrap;max-width:180px}
.ms-trigger .ms-label{overflow:hidden;text-overflow:ellipsis;flex:1;font-size:11px;color:#ccc}
.ms-trigger .ms-arrow{font-size:9px;color:#888;transition:transform .2s}
.ms-trigger.open .ms-arrow{transform:rotate(180deg)}
.ms-drop{display:none;position:absolute;top:100%;left:0;z-index:1000;background:#1a1a2e;border:1px solid #334;border-radius:6px;min-width:200px;max-height:320px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.5);margin-top:3px}
.ms-drop.open{display:flex;flex-direction:column}
.ms-search{padding:6px;border-bottom:1px solid #2a2a3e}
.ms-search input{width:100%;background:#252540;border:1px solid #333;color:#fff;padding:5px 8px;border-radius:4px;font-size:12px;outline:none}
.ms-search input:focus{border-color:#e94560}
.ms-options{overflow-y:auto;flex:1;padding:2px 0}
.ms-opt{display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;font-size:12px;color:#ddd;transition:background .15s}
.ms-opt:hover{background:rgba(233,69,96,.15)}
.ms-opt .ms-cb{width:14px;height:14px;border:2px solid #667;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ms-opt.checked .ms-cb{background:#e94560;border-color:#e94560}.ms-opt.checked .ms-cb::after{content:'✓';font-size:10px;color:#fff;font-weight:700}
.ms-opt .ms-val{flex:1;overflow:hidden;text-overflow:ellipsis}
.ms-opt-all{border-bottom:1px solid #2a2a3e;color:#e94560;font-weight:600}

/* File Selector */
.file-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
.file-bar .btn-folder{background:#4a9eff;color:#fff;padding:5px 16px;border-radius:5px;font-size:12px;cursor:pointer;font-weight:600;border:none;transition:all .2s;display:flex;align-items:center;gap:5px}
.file-bar .btn-folder:hover{background:#3a8eef;transform:translateY(-1px)}
.file-bar .btn-refresh{background:#2ed573;color:#fff;padding:5px 16px;border-radius:5px;font-size:12px;cursor:pointer;font-weight:600;border:none;transition:all .2s;display:flex;align-items:center;gap:5px}
.file-bar .btn-refresh:hover{background:#26bf65;transform:translateY(-1px)}
.file-bar .file-status{font-size:11px;color:#8899aa}
.file-bar .file-status.loaded{color:#2ed573}
.file-bar .file-status.error{color:#e94560}

/* File multi-select in header */
.ms-file .ms-trigger{background:#1a1a2e;border:1px solid #4a9eff;color:#4a9eff;max-width:260px}
.ms-file .ms-drop{background:#1a1a2e;min-width:220px}
.ms-file .ms-opt{color:#aaa}
.ms-file .ms-opt.checked{color:#fff}

/* KPI */
.kpi{display:grid;gap:8px;margin-bottom:14px}
.kpi1{grid-template-columns:repeat(6,1fr)}
.kpi2{grid-template-columns:repeat(7,1fr)}
.kc{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 6px rgba(0,0,0,.05);border-left:4px solid #4a9eff;transition:all .2s}
.kc:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.kc .l{font-size:10px;color:#888;margin-bottom:3px;font-weight:500}.kc .v{font-size:18px;font-weight:700;font-family:Consolas,monospace}
.kc.br{border-left-color:#e94560}.kc.bg{border-left-color:#2ed573}.kc.bo{border-left-color:#ffa502}
.kc.bp{border-left-color:#a55eea}.kc.bb{border-left-color:#4a9eff}.kc.bt{border-left-color:#00d2d3}
.kc .v.cr{color:#e94560}.kc .v.co{color:#ffa502}.kc .v.cg{color:#2ed573}
.sec{background:#fff;border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.shd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #f0f2f5;flex-wrap:wrap;gap:6px}
.shd h2{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px}
.tw{overflow-x:auto;border-radius:6px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8f9fa;padding:7px 8px;text-align:left;font-weight:600;color:#555;white-space:nowrap;border-bottom:2px solid #e0e0e0;position:sticky;top:0;font-size:11px}
td{padding:5px 8px;border-bottom:1px solid #f0f0f0;white-space:nowrap;transition:background .15s}
tr:hover td{background:#f0f4ff!important}
.num{text-align:right;font-family:Consolas,'JetBrains Mono',monospace;font-size:12px}
.bar{display:inline-flex;align-items:center;gap:4px}
.bar .bg{display:inline-block;width:55px;height:14px;background:#f0f0f0;border-radius:7px;overflow:hidden;vertical-align:middle;flex-shrink:0}
.bar .bf{height:100%;border-radius:7px;transition:width .5s}
.bar .bf.g{background:linear-gradient(90deg,#2ed573,#7bed9f)}.bar .bf.o{background:linear-gradient(90deg,#ffa502,#eccc68)}
.bar .bf.r{background:linear-gradient(90deg,#e94560,#ff6b81)}.bar .bf.p{background:linear-gradient(90deg,#a55eea,#dda0dd)}
.bar .bf.b{background:linear-gradient(90deg,#4a9eff,#74b9ff)}.bar .pv{font-size:11px;font-weight:500;min-width:40px;text-align:right}
.as{margin-bottom:8px;border:1px solid #e8e8e8;border-radius:8px;overflow:hidden}
.ah{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;user-select:none;transition:all .2s;flex-wrap:wrap;gap:8px}
.ah:hover{filter:brightness(.95)}
.ah .t{font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px}
.ah .st{display:flex;gap:12px;font-size:11px;flex-wrap:wrap}
.ah .st .si{text-align:right;min-width:55px}
.ah .st .si .sl{color:#888;font-size:9px;margin-bottom:1px}
.ah .st .si .sv{font-weight:600;font-size:12px}
.ab{display:none;padding:10px 14px;background:#fafbfc;border-top:1px solid #e8e8e8;overflow-x:auto}
.ab.open{display:block}
.ar{transition:transform .3s;display:inline-block;font-size:12px}.ar.open{transform:rotate(90deg)}
.wt{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.wt.g{background:#e8f5e9;color:#2e7d32}.wt.o{background:#fff3e0;color:#e65100}.wt.r{background:#fce4ec;color:#c62828}.wt.p{background:#f3e5f5;color:#6a1b9a}
.tabs{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.tb{padding:6px 14px;border:1px solid #ddd;background:#f8f9fa;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;transition:all .2s;color:#666;font-weight:500}
.tb.act{background:#fff;border-bottom-color:#fff;color:#1a1a2e;font-weight:700}
.tb:hover:not(.act){background:#eef0f5}
.tp{display:none}.tp.act{display:block}
tr.row-super td{background:#fef0f0!important}tr.row-high td{background:#fff8f0!important}
.empty-state{text-align:center;padding:60px 20px;color:#999}
.empty-state .icon{font-size:48px;margin-bottom:16px}
.empty-state .title{font-size:18px;color:#666;margin-bottom:8px}
.empty-state .desc{font-size:13px;color:#999;line-height:1.6}
.loading{text-align:center;padding:40px;color:#e94560;font-size:16px}
.loading .spinner{display:inline-block;width:24px;height:24px;border:3px solid #f0f0f0;border-top-color:#e94560;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.err-msg{text-align:center;padding:40px;color:#e94560;background:#fff;border-radius:12px;margin-bottom:14px}
@media(max-width:1200px){.kpi1{grid-template-columns:repeat(3,1fr)}.kpi2{grid-template-columns:repeat(4,1fr)}}
@media(max-width:768px){.kpi1{grid-template-columns:repeat(2,1fr)}.kpi2{grid-template-columns:repeat(2,1fr)}.fbar .fg{width:100%}.fbar select,.fbar input{min-width:0;flex:1}.ms-wrap{width:100%}.ms-trigger{max-width:100%}}
</style>
</head>
<body>

<div class="header">
  <div class="htop">
    <h1>美线客厅家具柜 <span class="hl">全部搜索广告</span> · 日监控</h1>
    <div class="db" id="db">等待加载数据...</div>
  </div>
  <div class="file-bar">
    <button class="btn-folder" onclick="pickFolder()">📁 选择文件夹</button>
    <div class="ms-wrap ms-file" id="fileSelector">
      <div class="ms-trigger" onclick="toggleFileDrop()">
        <span class="ms-label" id="fileLabel">未选择文件</span>
        <span class="ms-arrow">▾</span>
      </div>
      <div class="ms-drop" id="fileDrop">
        <div class="ms-options" id="fileOptions">
          <div style="padding:12px;color:#888;font-size:12px;text-align:center">请先选择文件夹</div>
        </div>
      </div>
    </div>
    <button class="btn-refresh" onclick="refreshData()">🔄 刷新数据</button>
    <input type="file" id="folderPicker" webkitdirectory multiple accept=".xlsx,.xls" style="display:none" onchange="onFolderPicked(event)">
    <span class="file-status" id="fileStatus"></span>
  </div>
  <div class="fbar" id="filterBar">
    <!-- Filters will be populated by JS -->
  </div>
</div>

<div class="container">
  <!-- Empty state shown when no data -->
  <div class="empty-state" id="emptyState">
    <div class="icon">📊</div>
    <div class="title">选择数据文件开始分析</div>
    <div class="desc">
      点击「选择文件夹」按钮，选择包含 xlsx 报表的文件夹<br>
      系统将自动识别 YYYYMMDD_YYYMMDD 格式的报表文件<br>
      可选择单个或多个文件，点击「刷新数据」即可加载分析
    </div>
  </div>

  <!-- Dashboard content (hidden initially) -->
  <div id="dashboardContent" style="display:none">
    <!-- KPI Row 1: 6 metrics -->
    <div class="kpi kpi1" id="kpi1"></div>
    <!-- KPI Row 2: 7 metrics -->
    <div class="kpi kpi2" id="kpi2"></div>

    <!-- ACOS分段预警 -->
    <div class="sec">
      <div class="shd"><h2>ACOS 分段预警</h2><span style="font-size:11px;color:#999">点击每段可展开查看CAM详情</span></div>
      <div id="acosArea"></div>
    </div>

    <!-- 业务组警示 -->
    <div class="sec">
      <div class="shd"><h2>业务组警示 <span style="font-size:12px;color:#999;font-weight:400">ACOS&gt;50%</span></h2></div>
      <div class="tw"><div id="gw_table"></div></div>
    </div>

    <!-- 业务负责人警示 -->
    <div class="sec">
      <div class="shd"><h2>业务负责人警示 <span style="font-size:12px;color:#999;font-weight:400">ACOS&gt;50%</span></h2></div>
      <div class="tw"><div id="ow_table"></div></div>
    </div>

    <!-- 明细分析 -->
    <div class="sec">
      <div class="shd"><h2>明细分析</h2></div>
      <div class="tabs">
        <button class="tb act" onclick="sw('s',this)">店铺</button>
        <button class="tb" onclick="sw('a',this)">广告类型</button>
        <button class="tb" onclick="sw('c',this)">三级分类</button>
        <button class="tb" onclick="sw('m',this)">分类×类型 交叉分析</button>
      </div>
      <div id="tp_s" class="tp act"><div class="tw"><table id="tbl_s"></table></div></div>
      <div id="tp_a" class="tp"><div class="tw"><table id="tbl_a"></table></div></div>
      <div id="tp_c" class="tp"><div class="tw"><table id="tbl_c"></table></div></div>
      <div id="tp_m" class="tp"><div class="tw"><table id="tbl_m"></table></div></div>
    </div>

    <!-- 全量数据 -->
    <div class="sec">
      <div class="shd"><h2>全量数据</h2><span style="font-size:11px;color:#999">Top 500 · 按花费降序</span></div>
      <div class="tw"><table id="tbl_fd"></table></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// Utility Functions
// ============================================================
const F=(v,d=2)=>{if(v===0||v===null||v===undefined)return'0.00';return Number(v).toFixed(d)}
const FN=v=>{if(!v||v===0)return'0';return Number(v).toLocaleString()}
const FP=v=>{if(!v||v===0)return'0.00%';return(v*100).toFixed(2)+'%'}
const FPn=v=>{if(!v||v===0)return'0.00%';return(v*100).toFixed(2)}
const FNn=v=>{if(!v||v===0)return'0';return Number(v).toLocaleString()}

function acosColor(v){
  if(v>0.7)return'#e94560';if(v>0.5)return'#ff6348';if(v>0.3)return'#ffa502'
  if(v>0.15)return'#2ed573';return'#4a9eff'
}
function goodColor(v,min,max){
  const r=max===min?0.5:Math.max(0,Math.min(1,(v-min)/(max-min)))
  if(r>0.7)return'#2ed573';if(r>0.4)return'#ffa502';return'#e94560'
}

// ============================================================
// State
// ============================================================
let D=null // { raw: [[row...]], filters: {label:[values]} }
let selectedFiles=[] // File objects matching pattern
let fileNames=[] // matching file names
let checkedFiles=new Set() // currently checked file names

// ============================================================
// File Picker
// ============================================================
function pickFolder(){
  document.getElementById('folderPicker').click()
}

function onFolderPicked(e){
  const files=e.target.files
  if(!files||!files.length)return
  selectedFiles=[]
  fileNames=[]
  // Filter for YYYYMMDD_YYYMMDD.xlsx pattern
  const pattern=/^(\d{8})_(\d{8})\.xlsx$/i
  for(let i=0;i<files.length;i++){
    const f=files[i]
    const m=f.name.match(pattern)
    if(m) {
      selectedFiles.push(f)
      fileNames.push(f.name)
    }
  }
  // Sort by date (first date)
  fileNames.sort()
  selectedFiles.sort((a,b)=>a.name.localeCompare(b.name))

  if(fileNames.length===0){
    document.getElementById('fileStatus').textContent='未找到匹配的报表文件'
    document.getElementById('fileStatus').className='file-status error'
    return
  }

  // Default: select all
  checkedFiles=new Set(fileNames)
  renderFileDropdown()
  document.getElementById('fileStatus').textContent=`已识别 ${fileNames.length} 个报表文件`
  document.getElementById('fileStatus').className='file-status loaded'
}

function toggleFileDrop(){
  document.getElementById('fileDrop').classList.toggle('open')
  document.getElementById('fileSelector').querySelector('.ms-trigger').classList.toggle('open')
}

function renderFileDropdown(){
  const container=document.getElementById('fileOptions')
  if(fileNames.length===0){
    container.innerHTML='<div style="padding:12px;color:#888;font-size:12px;text-align:center">请先选择文件夹</div>'
    return
  }
  const allChecked=checkedFiles.size===fileNames.length
  let html=`<div class="ms-opt ms-opt-all ${allChecked?'checked':''}" onclick="toggleAllFiles()">
    <span class="ms-cb"></span><span class="ms-val">${allChecked?'取消全选':'全选'} (${fileNames.length})</span>
  </div>`
  fileNames.forEach((n,i)=>{
    const ck=checkedFiles.has(n)
    html+=`<div class="ms-opt ${ck?'checked':''}" onclick="toggleFile('${n}')">
      <span class="ms-cb"></span><span class="ms-val">${n}</span>
    </div>`
  })
  container.innerHTML=html
  const label=document.getElementById('fileLabel')
  label.textContent=checkedFiles.size===0?'未选择文件':`已选 ${checkedFiles.size}/${fileNames.length}`
}

function toggleAllFiles(){
  if(checkedFiles.size===fileNames.length) checkedFiles=new Set()
  else checkedFiles=new Set(fileNames)
  renderFileDropdown()
}

function toggleFile(name){
  if(checkedFiles.has(name)) checkedFiles.delete(name)
  else checkedFiles.add(name)
  renderFileDropdown()
}

// ============================================================
// Data Loading via SheetJS
// ============================================================
async function refreshData(){
  if(checkedFiles.size===0){
    document.getElementById('fileStatus').textContent='请至少选择一个文件'
    document.getElementById('fileStatus').className='file-status error'
    return
  }

  document.getElementById('fileStatus').textContent='加载中...'
  document.getElementById('fileStatus').className='file-status'
  document.getElementById('emptyState').style.display='none'

  // Close file dropdown
  document.getElementById('fileDrop').classList.remove('open')
  document.getElementById('fileSelector').querySelector('.ms-trigger').classList.remove('open')

  try {
    const allRows=[]
    const allFilters={投放状态:new Set(),店铺:new Set(),业务组:new Set(),业务负责人:new Set(),三级分类:new Set(),广告类型:new Set()}

    for(let i=0;i<selectedFiles.length;i++){
      const f=selectedFiles[i]
      if(!checkedFiles.has(f.name)) continue

      const buf=await f.arrayBuffer()
      const wb=XLSX.read(buf,{type:'array'})
      const ws=wb.Sheets[wb.SheetNames[0]]
      const rows=XLSX.utils.sheet_to_json(ws,{header:1})

      // rows[0] = header, skip it
      for(let r=1;r<rows.length;r++){
        const row=rows[r]
        if(!row||!row.length) continue
        // Map columns: see README for column mapping
        // [0]=状态 [1]=店铺 [2]=业务组 [3]=负责人 [4]=三级分类 [5]=广告类型
        // [6]=广告活动 [7]=花费 [8]=展示量 [9]=点击量 [10]=转化量 [11]=销售额
        // [12]=ACOS [13]=推广商品销量 [14]=总销量
        const status=String(row[6]||'').trim()
        const store=String(row[12]||'').trim()
        const group=String(row[2]||'').trim()
        const owner=String(row[3]||'').trim()
        const cat3=String(row[4]||'').trim()
        const adType=String(row[7]||'').trim()
        const campaign=String(row[8]||'').trim()

        if(!campaign) continue // skip empty rows

        const spend=parseFloat(row[36])||0
        const impressions=parseFloat(row[38])||0
        const clicks=parseFloat(row[39])||0
        const conversions=parseFloat(row[40])||0
        const salesAmt=parseFloat(row[42])||0
        const acos=parseFloat(row[34])||0
        const promotedQty=parseFloat(row[43])||0
        const totalQty=parseFloat(row[41])||0

        const rec=[status,store,group,owner,cat3,adType,campaign,spend,impressions,clicks,conversions,salesAmt,acos,promotedQty,totalQty]
        allRows.push(rec)

        // Collect filter values
        if(status) allFilters['投放状态'].add(status)
        if(store) allFilters['店铺'].add(store)
        if(group) allFilters['业务组'].add(group)
        if(owner) allFilters['业务负责人'].add(owner)
        if(cat3) allFilters['三级分类'].add(cat3)
        if(adType) allFilters['广告类型'].add(adType)
      }
    }

    if(allRows.length===0){
      document.getElementById('fileStatus').textContent='所选文件无有效数据'
      document.getElementById('fileStatus').className='file-status error'
      document.getElementById('emptyState').style.display='block'
      return
    }

    // Update state
    D={raw:allRows}
    D.filters={}
    Object.keys(allFilters).forEach(k=>{
      D.filters[k]=Array.from(allFilters[k]).sort()
    })

    // Calculate date range from file names
    const selectedNames=fileNames.filter(n=>checkedFiles.has(n)).sort()
    if(selectedNames.length>0){
      const first=selectedNames[0].match(/^(\d{8})/)?.[1]
      const last=selectedNames[selectedNames.length-1].match(/_(\d{8})/)?.[1]
      if(first&&last){
        const fmt=d=>`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`
        document.getElementById('db').textContent=`📅 ${fmt(first)} ~ ${fmt(last)} · ${allRows.length} 条记录`
      }else{
        document.getElementById('db').textContent=`📅 ${allRows.length} 条记录`
      }
    }

    document.getElementById('fileStatus').textContent=`✅ ${checkedFiles.size} 个文件 · ${allRows.length} 条数据`
    document.getElementById('fileStatus').className='file-status loaded'

    // Init filters
    initFilters()
    // Render all
    apply()
    document.getElementById('dashboardContent').style.display='block'
    document.getElementById('emptyState').style.display='none'

  }catch(e){
    document.getElementById('fileStatus').textContent='加载失败: '+e.message
    document.getElementById('fileStatus').className='file-status error'
    console.error(e)
  }
}

// ============================================================
// Multi-Select Filter Component
// ============================================================
const filterStates={} // {key: {selected: Set, search: string, allValues: []}}

function initFilters(){
  const bar=document.getElementById('filterBar')
  const filterLabels=['投放状态','店铺','业务组','业务负责人','三级分类','广告类型']
  bar.innerHTML=''

  filterLabels.forEach((label,i)=>{
    const values=D.filters[label]||[]
    filterStates[label]={selected:new Set(values),search:'',allValues:values}
    bar.innerHTML+=`<div class="fg ms-wrap filter-${i}" data-filter="${label}">
      <label>${label}</label>
      <div class="ms-trigger filter-trigger" onclick="toggleFilterDrop(this)" data-filter="${label}">
        <span class="ms-label" id="fl-${i}">全部</span>
        <span class="ms-arrow">▾</span>
      </div>
      <div class="ms-drop filter-drop" id="fd-${i}"></div>
    </div>`
  })

  // Search input for 广告活动
  bar.innerHTML+=`<div class="fg"><label>广告活动</label><input id="fSearch" placeholder="搜索广告活动..." style="min-width:120px" oninput="apply()"></div>`
  // Clear button
  bar.innerHTML+=`<button class="btn clr" onclick="clearFilters()">✕ 清除</button>`

  // Render dropdown for each filter
  filterLabels.forEach((label,i)=>{
    renderFilterDrop(label,i)
  })
}

function renderFilterDrop(label,idx){
  const st=filterStates[label]
  const drop=document.getElementById('fd-'+idx)
  const searchTerm=st.search.toLowerCase()
  const filtered=st.allValues.filter(v=>v.toLowerCase().includes(searchTerm))
  const allChecked=st.selected.size===st.allValues.length

  let html=`<div class="ms-search"><input placeholder="搜索..." oninput="onFilterSearch('${label}','${idx}',this.value)" onclick="event.stopPropagation()"></div>`
  html+=`<div class="ms-opt ms-opt-all ${allChecked?'checked':''}" onclick="toggleFilterAll('${label}','${idx}')">
    <span class="ms-cb"></span><span class="ms-val">${allChecked?'取消全选':'全选'} (${st.allValues.length})</span>
  </div>`
  filtered.forEach(v=>{
    const ck=st.selected.has(v)
    html+=`<div class="ms-opt ${ck?'checked':''}" onclick="toggleFilterVal('${label}','${idx}','${v.replace(/'/g,"\\'")}')">
      <span class="ms-cb"></span><span class="ms-val">${v}</span>
    </div>`
  })
  drop.innerHTML=html
  updateFilterLabel(label,idx)
}

function onFilterSearch(label,idx,val){
  filterStates[label].search=val
  renderFilterDrop(label,idx)
}

function toggleFilterDrop(el){
  // Close all other filter drops
  document.querySelectorAll('.filter-drop').forEach(d=>d.classList.remove('open'))
  document.querySelectorAll('.filter-trigger').forEach(t=>t.classList.remove('open'))
  // Toggle current
  const drop=el.nextElementSibling
  drop.classList.toggle('open')
  el.classList.toggle('open')
  // Focus search input
  if(drop.classList.contains('open')){
    const inp=drop.querySelector('.ms-search input')
    if(inp) setTimeout(()=>inp.focus(),50)
  }
}

function toggleFilterAll(label,idx){
  const st=filterStates[label]
  if(st.selected.size===st.allValues.length) st.selected=new Set()
  else st.selected=new Set(st.allValues)
  renderFilterDrop(label,idx)
  apply()
}

function toggleFilterVal(label,idx,val){
  const st=filterStates[label]
  if(st.selected.has(val)) st.selected.delete(val)
  else st.selected.add(val)
  renderFilterDrop(label,idx)
  apply()
}

function updateFilterLabel(label,idx){
  const st=filterStates[label]
  const el=document.getElementById('fl-'+idx)
  if(st.selected.size===0) el.textContent='(无)'
  else if(st.selected.size===st.allValues.length) el.textContent='全部'
  else if(st.selected.size<=3) el.textContent=Array.from(st.selected).join(', ')
  else el.textContent=`${st.selected.size} 项`
}

function clearFilters(){
  const filterLabels=['投放状态','店铺','业务组','业务负责人','三级分类','广告类型']
  filterLabels.forEach((label,i)=>{
    filterStates[label].selected=new Set(filterStates[label].allValues)
    filterStates[label].search=''
    renderFilterDrop(label,i)
  })
  document.getElementById('fSearch').value=''
  apply()
}

// Close filter dropdowns when clicking outside
document.addEventListener('click',function(e){
  if(!e.target.closest('.ms-wrap')){
    document.querySelectorAll('.filter-drop').forEach(d=>d.classList.remove('open'))
    document.querySelectorAll('.filter-trigger').forEach(t=>t.classList.remove('open'))
    document.getElementById('fileDrop').classList.remove('open')
    document.getElementById('fileSelector').querySelector('.ms-trigger')?.classList.remove('open')
  }
})

// ============================================================
// Data Filtering & Rendering
// ============================================================
function getFilteredData(){
  if(!D||!D.raw) return[]
  const filterLabels=['投放状态','店铺','业务组','业务负责人','三级分类','广告类型']
  const searchVal=document.getElementById('fSearch')?.value?.toLowerCase().trim()||''

  return D.raw.filter(r=>{
    // Multi-select filter: r[0..5] maps to filterLabels
    for(let i=0;i<6;i++){
      const st=filterStates[filterLabels[i]]
      if(!st||st.selected.size===0) return false
      if(!st.selected.has(r[i])) return false
    }
    // Search in campaign name (r[6])
    if(searchVal&&r[6].toLowerCase().indexOf(searchVal)===-1) return false
    return true
  })
}

function apply(){
  renderAll()
}

function renderAll(){
  if(!D||!D.raw){
    document.getElementById('dashboardContent').style.display='none'
    document.getElementById('emptyState').style.display='block'
    return
  }
  const filtered=getFilteredData()
  if(filtered.length===0){
    // Show empty KPI
    document.getElementById('kpi1').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:20px;color:#999">筛选结果为空</div>'
    document.getElementById('kpi2').innerHTML=''
    document.getElementById('acosArea').innerHTML=''
    document.getElementById('gw_table').innerHTML='<div style="padding:16px;text-align:center;color:#999">无数据</div>'
    document.getElementById('ow_table').innerHTML='<div style="padding:16px;text-align:center;color:#999">无数据</div>'
    ;['tbl_s','tbl_a','tbl_c','tbl_m','tbl_fd'].forEach(id=>{
      document.getElementById(id).innerHTML='<tr><td style="text-align:center;color:#999;padding:16px;">无数据</td></tr>'
    })
    return
  }

  const ts=filtered.reduce((s,r)=>s+r[7],0)||1
  const camps=new Set()
  let sp=0,im=0,cl=0,sq=0,sa=0,pq=0,tq=0

  filtered.forEach(r=>{
    camps.add(r[6]);sp+=r[7];im+=r[8];cl+=r[9];sq+=r[10];sa+=r[11];pq+=r[13];tq+=r[14]
  })

  const c=camps.size
  const cpc=cl>0?sp/cl:0
  const ctr=im>0?cl/im:0
  const cvr=cl>0?sq/cl:0
  const cpo=sq>0?sp/sq:0
  const acos=sa>0?sp/sa:0
  const roas=sp>0?sa/sp:0
  const dr=tq>0?pq/tq:0

  // KPI Row 1: 6 metrics - no emojis
  const kpi1=[
    {l:'广告活动数',v:FN(c),cl:'bb'},
    {l:'总花费',v:'$'+F(sp),cl:'br'},
    {l:'展示量',v:FN(im),cl:'bb'},
    {l:'点击量',v:FN(cl),cl:'bb'},
    {l:'转化量',v:FN(sq),cl:'bg'},
    {l:'销售额',v:'$'+F(sa),cl:'bg'}
  ]
  document.getElementById('kpi1').innerHTML=kpi1.map(k=>`<div class="kc ${k.cl}"><div class="l">${k.l}</div><div class="v">${k.v}</div></div>`).join('')

  // KPI Row 2: 7 metrics - no emojis
  const kpi2=[
    {l:'$CPC',v:'$'+F(cpc,4),cl:'bt'},
    {l:'CTR%',v:FP(ctr),cl:'bt'},
    {l:'CVR%',v:FP(cvr),cl:'bt'},
    {l:'$CPO',v:'$'+F(cpo),cl:'bt'},
    {l:'ACOS%',v:FP(acos),cl:acos>0.5?'br':acos>0.3?'bo':'bg'},
    {l:'ROAS',v:F(roas),cl:roas<2?'br':'bg'},
    {l:'直购率%',v:FP(dr),cl:'bp'}
  ]
  document.getElementById('kpi2').innerHTML=kpi2.map(k=>`<div class="kc ${k.cl}"><div class="l">${k.l}</div><div class="v">${k.v}</div></div>`).join('')

  // ACOS分段预警
  renderACOS(filtered,ts)
  // 业务组警示 (group index 2)
  renderHigh('gw_table',filtered,2,ts)
  // 业务负责人警示 (group index 3)
  renderHigh('ow_table',filtered,3,ts)
  // 明细分析
  renderDet('tbl_s',aggregateBy(filtered,1),['店铺','活动数','花费','占总花费','$CPC','CTR%','CVR%','$CPO','ACOS%','ROAS'],['name','cam','sp','spPct','cpc','ctr','cvr','cpo','acos','roas'])
  renderDet('tbl_a',aggregateBy(filtered,5),['广告类型','活动数','花费','占总花费','$CPC','CTR%','CVR%','$CPO','ACOS%','ROAS'],['name','cam','sp','spPct','cpc','ctr','cvr','cpo','acos','roas'])
  renderDet('tbl_c',aggregateBy(filtered,4),['三级分类','活动数','花费','占总花费','$CPC','CTR%','CVR%','$CPO','ACOS%','ROAS'],['name','cam','sp','spPct','cpc','ctr','cvr','cpo','acos','roas'])
  renderDet('tbl_m',aggregateByCross(filtered),['三级分类×广告类型','活动数','花费','占总花费','$CPC','CTR%','CVR%','$CPO','ACOS%','ROAS'],['name','cam','sp','spPct','cpc','ctr','cvr','cpo','acos','roas'])
  // 全量数据 Top 500
  renderFullData(filtered)
}

function aggregateBy(data,gi){
  const groups={}
  data.forEach(r=>{
    let key=String(r[gi]||'')
    if(!key||key==='0'||key===''||key==='nan') key='未知'
    if(!groups[key]) groups[key]={sp:0,cl:0,im:0,sq:0,sa:0,cam:new Set()}
    const g=groups[key];g.sp+=r[7];g.cl+=r[9];g.im+=r[8];g.sq+=r[10];g.sa+=r[11]
    if(r[6]) g.cam.add(r[6])
  })
  return Object.keys(groups).map(k=>{
    const g=groups[k]
    return{name:k,cam:g.cam.size,sp:g.sp,spPct:0,cpc:g.cl>0?g.sp/g.cl:0,ctr:g.im>0?g.cl/g.im:0,cvr:g.cl>0?g.sq/g.cl:0,cpo:g.sq>0?g.sp/g.sq:0,acos:g.sa>0?g.sp/g.sa:0,roas:g.sp>0?g.sa/g.sp:0}
  }).sort((a,b)=>b.sp-a.sp)
}

function aggregateByCross(data){
  const groups={}
  data.forEach(r=>{
    const cat3=String(r[4]||'').trim()||'未知'
    const adType=String(r[5]||'').trim()||'未知'
    const key=cat3+' × '+adType
    if(!groups[key]) groups[key]={sp:0,cl:0,im:0,sq:0,sa:0,cam:new Set()}
    const g=groups[key];g.sp+=r[7];g.cl+=r[9];g.im+=r[8];g.sq+=r[10];g.sa+=r[11]
    if(r[6]) g.cam.add(r[6])
  })
  return Object.keys(groups).map(k=>{
    const g=groups[k]
    return{name:k,cam:g.cam.size,sp:g.sp,spPct:0,cpc:g.cl>0?g.sp/g.cl:0,ctr:g.im>0?g.cl/g.im:0,cvr:g.cl>0?g.sq/g.cl:0,cpo:g.sq>0?g.sp/g.sq:0,acos:g.sa>0?g.sp/g.sa:0,roas:g.sp>0?g.sa/g.sp:0}
  }).sort((a,b)=>b.sp-a.sp)
}

// ============================================================
// ACOS Segment
// ============================================================
function renderACOS(data,ts){
  const area=document.getElementById('acosArea');area.innerHTML=''
  const segments=[
    {k:'all',mn:-Infinity,mx:Infinity,lbl:'全部'},
    {k:'normal',mn:-Infinity,mx:0.30,lbl:'ACOS≤30%'},
    {k:'caution',mn:0.30,mx:0.50,lbl:'30%<ACOS≤50%'},
    {k:'super',mn:0.50,mx:Infinity,lbl:'ACOS>50%'}
  ]
  const bgColor={g:'#e8f5e9',o:'#fff3e0',r:'#fce4ec',p:'#f3e5f5'}
  const bdColor={g:'#4caf50',o:'#ff9800',r:'#f44336',p:'#9c27b0'}
  const clsMap={'all':'g','normal':'g','caution':'o','super':'r'}

  segments.forEach(seg=>{
    let sub=[]
    if(seg.k==='all') sub=data
    else sub=data.filter(r=>{
      const a=r[12]
      if(seg.k==='normal') return a<=seg.mx
      if(seg.k==='super') return a>seg.mn
      return a>seg.mn&&a<=seg.mx
    })
    if(!sub.length) return

    const camps=new Set(sub.map(r=>r[6]))
    const sp=sub.reduce((s,r)=>s+r[7],0)
    const im=sub.reduce((s,r)=>s+r[8],0)
    const cl=sub.reduce((s,r)=>s+r[9],0)
    const sq=sub.reduce((s,r)=>s+r[10],0)
    const sa=sub.reduce((s,r)=>s+r[11],0)
    const pct=ts>0?sp/ts*100:0
    const cpc=cl>0?sp/cl:0
    const ctr=im>0?cl/im:0
    const cvr=cl>0?sq/cl:0
    const cpo=sq>0?sp/sq:0
    const acos=sa>0?sp/sa:0
    const roas=sp>0?sa/sp:0
    const clr=clsMap[seg.k]||'g'

    const wrap=document.createElement('div');wrap.className='as'
    wrap.innerHTML=`<div class="ah" style="background:${bgColor[clr]}10;border-left:4px solid ${bdColor[clr]}">
      <div class="t"><span>${seg.lbl}</span><span class="wt ${clr}">${camps.size} CAM · $${F(sp)}</span></div>
      <div class="st">
        <div class="si"><div class="sl">占比</div><div class="sv">${F(pct)}%</div></div>
        <div class="si"><div class="sl">$CPC</div><div class="sv">$${F(cpc,4)}</div></div>
        <div class="si"><div class="sl">CTR</div><div class="sv">${FP(ctr)}</div></div>
        <div class="si"><div class="sl">CVR</div><div class="sv">${FP(cvr)}</div></div>
        <div class="si"><div class="sl">ACOS</div><div class="sv" style="color:${acosColor(acos)}">${FP(acos)}</div></div>
        <div class="si"><div class="sl">ROAS</div><div class="sv">${F(roas)}</div></div>
        <span class="ar">▸</span>
      </div>
    </div>
    <div class="ab"><div class="tw"><table><thead><tr>
      <th>广告活动</th><th class="num">花费</th><th class="num">$CPC</th><th class="num">CTR%</th><th class="num">ACOS%</th>
    </tr></thead><tbody></tbody></table></div></div>`

    area.appendChild(wrap)

    wrap.querySelector('.ah').addEventListener('click',function(){
      const bd=this.nextElementSibling;bd.classList.toggle('open')
      this.querySelector('.ar').classList.toggle('open')
      if(bd.classList.contains('open')&&!bd.dataset.rendered){
        // Aggregate by campaign
        const cm={};sub.forEach(r=>{
          const n=r[6]||'未知'
          if(!cm[n]) cm[n]={sp:0,cl:0,im:0,sq:0,sa:0}
          cm[n].sp+=r[7];cm[n].cl+=r[9];cm[n].im+=r[8];cm[n].sq+=r[10];cm[n].sa+=r[11]
        })
        const arr=Object.keys(cm).sort((a,b)=>cm[b].sp-cm[a].sp).slice(0,50)
        const tbody=bd.querySelector('tbody')
        tbody.innerHTML=arr.map(n=>{
          const c=cm[n];const cp=c.cl>0?c.sp/c.cl:0;const ct=c.im>0?c.cl/c.im:0
          const ac=c.sa>0?c.sp/c.sa:0
          return `<tr><td>${n}</td><td class="num">$${F(c.sp)}</td><td class="num">$${F(cp,4)}</td><td class="num">${FP(ct)}</td><td class="num" style="font-weight:700;color:${acosColor(ac)}">${FP(ac)}</td></tr>`
        }).join('')
        bd.dataset.rendered='1'
      }
    })
  })
}

function renderHigh(cid,data,gi,ts){
  const groups={}
  data.forEach(r=>{
    let key=String(r[gi]||'')
    if(!key||key==='0'||key===''||key==='nan') key='未知'
    if(!groups[key]) groups[key]={sp:0,cl:0,im:0,sq:0,sa:0,cam:new Set()}
    const g=groups[key];g.sp+=r[7];g.cl+=r[9];g.im+=r[8];g.sq+=r[10];g.sa+=r[11]
    if(r[6]) g.cam.add(r[6])
  })
  const arr=Object.keys(groups).map(k=>{
    const g=groups[k]
    return{name:k,cam:g.cam.size,sp:g.sp,spPct:ts>0?g.sp/ts*100:0,cpc:g.cl>0?g.sp/g.cl:0,ctr:g.im>0?g.cl/g.im:0,cvr:g.cl>0?g.sq/g.cl:0,cpo:g.sq>0?g.sp/g.sq:0,acos:g.sa>0?g.sp/g.sa:0,roas:g.sp>0?g.sa/g.sp:0}
  }).filter(x=>x.acos>0.50).sort((a,b)=>b.sp-a.sp)

  if(!arr.length){con.innerHTML='<div style="padding:16px;text-align:center;color:#999">全部 ACOS≤50% ✓</div>';return}

  arr.forEach(r=>{
    const cls=r.acos>1?'row-super':r.acos>0.7?'row-high':''
    const pctColor=r.spPct>20?'r':r.spPct>10?'o':'b'

    html+=`<tr class="${cls}">
      <td style="font-weight:600">${r.name}</td>
      <td class="num">${FNn(r.cam)}</td>
      <td class="num" style="background:linear-gradient(90deg,rgba(233,69,96,${Math.min(r.sp/maxSp*0.12,0.12)}) 0%,transparent ${Math.min(r.sp/maxSp*100,100)}%)">$${F(r.sp)}</td>
      <td class="num"><span class="bar"><span class="bg"><span class="bf ${pctColor}" style="width:${Math.min(r.spPct,100)}%"></span></span><span class="pv">${F(r.spPct)}%</span></span></td>
      <td class="num">$${F(r.cpc,4)}</td>
      <td class="num" style="color:${goodColor(r.ctr,0,Math.max(...arr.map(x=>x.ctr),0.01))}">${FP(r.ctr)}</td>
      <td class="num" style="color:${goodColor(r.cvr,0,Math.max(...arr.map(x=>x.cvr),0.01))}">${FP(r.cvr)}</td>
      <td class="num">$${F(r.cpo)}</td>
      <td class="num" style="font-weight:700;color:${acosClr}">${FP(r.acos)}</td>
      <td class="num" style="font-weight:700;color:${acosColor(1/Math.max(r.roas,0.01))}">${F(r.roas)}</td>
    </tr>`
  })
  html+='</tbody></table>';con.innerHTML=html
}

// ============================================================
// Detail Tables
// ============================================================
function renderDet(id,data,headers,fields){
  const tbl=document.getElementById(id);tbl.innerHTML=''
  if(!data||!data.length){tbl.innerHTML='<tr><td colspan="'+headers.length+'" style="text-align:center;color:#999;padding:16px;">无数据</td></tr>';return}
  const ts=data.reduce((s,r)=>s+r.sp,0)

  // Calculate spPct for each row
  const rowsWithPct=data.map(r=>({...r,spPct:ts>0?r.sp/ts*100:0}))

  let h='<thead><tr>'+headers.map((h,i)=>{
    const numFields=['cam','sp','im','cl','sq','cpc','ctr','cvr','cpo','acos','roas','dr']
    return '<th'+(numFields.includes(fields[i])?' class="num"':'')+'>'+h+'</th>'
  }).join('')+'</tr></thead><tbody>'

  const fmts={cam:FNn,sp:v=>'$'+F(v),im:FNn,cl:FNn,sq:FNn,cpc:v=>'$'+F(v,4),ctr:FPn,cvr:FPn,cpo:v=>'$'+F(v),acos:FPn,roas:F,dr:FPn,spPct:v=>F(v)+'%'}
  const maxVals={};fields.forEach(f=>{
    if(data.length&&['cam','sp','im','cl','sq','cpc','cpo'].includes(f))
      maxVals[f]=Math.max(...data.map(r=>Math.abs(Number(r[f])||0)),0.001)
  })

  rowsWithPct.forEach((r,i)=>{
    h+='<tr'+(i%2===1?' style="background:#fafbfc"':'')+'>'
    fields.forEach(f=>{
      const raw=Number(r[f])||0
      const val=fmts[f]?fmts[f](r[f]):(r[f]||'-')
      const isNum=['cam','sp','im','cl','sq','cpc','ctr','cvr','cpo','acos','roas','dr'].includes(f)
      let style=''
      if(f==='acos')style='color:'+acosColor(raw)+';font-weight:700'
      else if(f==='ctr'||f==='cvr'||f==='dr')style='color:'+goodColor(raw,0,maxVals['sp']*2)+';font-weight:500'
      else if(f==='roas')style='font-weight:600'
      else if(['cam','sp','im','cl','sq'].includes(f)&&raw>0)
        style='background:linear-gradient(90deg,rgba(233,69,96,0.06) 0%,rgba(233,69,96,0.06) '+(raw/maxVals[f]*50)+'%,transparent '+(raw/maxVals[f]*50+10)+'%)'
      h+='<td'+(isNum?' class="num"':'')+' style="'+style+'">'+val+'</td>'
    })
    h+='</tr>'
  })
  h+='</tbody>';tbl.innerHTML=h
}

// ============================================================
// Full Data Table
// ============================================================
function renderFullData(data){
  const tbl=document.getElementById('tbl_fd')
  const sorted=[...data].sort((a,b)=>b[7]-a[7]).slice(0,500)
  if(!sorted.length){tbl.innerHTML='<tr><td style="text-align:center;color:#999;padding:16px;">无数据</td></tr>';return}
  const headers=['投放状态','店铺','业务组','业务负责人','三级分类','广告类型','广告活动','花费','展示量','点击量','转化量','销售额','ACOS%','推广商品销量','总销量','直购率%']
  const fields=['f0','f1','f2','f3','f4','f5','f6','sp','im','cl','sq','sa','acos','pq','tq','dr']
  let html='<thead><tr>'+headers.map((h,i)=>'<th'+(i>=7?' class="num"':'')+'>'+h+'</th>').join('')+'</tr></thead><tbody>'
  sorted.forEach((r,i)=>{
    const dr=r[14]>0?r[13]/r[14]:0
    html+='<tr'+(i%2===1?' style="background:#fafbfc"':'')+'>'
    for(let j=0;j<7;j++) html+='<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis">'+(r[j]||'-')+'</td>'
    html+=`<td class="num">$${F(r[7])}</td><td class="num">${FN(r[8])}</td><td class="num">${FN(r[9])}</td>`
    html+=`<td class="num">${FN(r[10])}</td><td class="num">$${F(r[11])}</td>`
    html+=`<td class="num" style="font-weight:700;color:${acosColor(r[12])}">${FP(r[12])}</td>`
    html+=`<td class="num">${FN(r[13])}</td><td class="num">${FN(r[14])}</td>`
    html+=`<td class="num" style="color:${goodColor(dr,0,1)}">${FP(dr)}</td>`
    html+='</tr>'
  })
  html+='</tbody>';tbl.innerHTML=html
}

// ============================================================
// Tab Switching
// ============================================================
function sw(id,btn){
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('act'))
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('act'))
  document.getElementById('tp_'+id).classList.add('act');btn.classList.add('act')
}
